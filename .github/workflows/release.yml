name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: "Regular"
            prefix: ""
          - name: "Fabric_Waystones"
            prefix: "fwaystones_"
          - name: "Waystones"
            prefix: "waystone_"
    steps:
      - uses: actions/checkout@v6

      - name: Apply tower variant
        run: |
          for type in derelict derelict_grass ice jungle ocean ocean_warm regular; do
            file="data/totw_reworked/worldgen/template_pool/$type/top.json"
            sed -i "s|\"totw_reworked:$type/[^\"]*\"|\"totw_reworked:$type/${{ matrix.variant.prefix }}${type}_tower_top\"|" "$file"
          done

      - name: Create archive
        run: |
          MC_RANGE="1.21-26.1.2"
          zip -r "Towers_Of_The_Wild_Reworked-${{ github.ref_name }}+$MC_RANGE-${{ matrix.variant.name }}.zip" \
            data/ LICENSE pack.mcmeta pack.png README.md -x "*.bak"

      - uses: actions/upload-artifact@v7
        with:
          name: "${{ matrix.variant.name }}"
          path: "Towers_Of_The_Wild_Reworked-${{ github.ref_name }}+1.21-26.1.2-${{ matrix.variant.name }}.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8

      - name: Generate release notes
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            -q '.body')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            **/*.zip

  modrinth:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_ID }}
          version: ${{ github.ref_name }}
          name: ${{ github.ref_name }}+1.21-26.1.2
          changelog: ${{ needs.release.outputs.notes }}
          loaders: datapack
          game-versions: ">=1.21 <=26.1.2"
          files: |
            **/*.zip
